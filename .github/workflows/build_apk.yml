name: Build VVCE Timetable APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Universal APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Cache Flutter packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: flutter-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: flutter-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: Build Universal Release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/VVCE_Timetable_v${{ github.run_number }}.apk

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: VVCE_Timetable_APK
          path: build/app/outputs/flutter-apk/VVCE_Timetable_v${{ github.run_number }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/VVCE_Timetable_v${{ github.run_number }}.apk
          name: VVCE Timetable ${{ github.ref_name }}
          body: |
            ## 📱 VVCE Timetable ${{ github.ref_name }}
            
            **VVCE_Timetable_v${{ github.run_number }}.apk** — Universal APK (all Android devices)
            
            ### Install
            1. Download the APK below
            2. Enable "Install from unknown sources" in Android Settings
            3. Open and install
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          APK="build/app/outputs/flutter-apk/VVCE_Timetable_v${{ github.run_number }}.apk"
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "## ✅ Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| VVCE_Timetable_v${{ github.run_number }}.apk | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the **Artifacts** section ⬆️" >> $GITHUB_STEP_SUMMARY
