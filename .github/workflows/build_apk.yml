name: Build VVCE Timetable — Android APK + iOS IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Android Universal APK
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: flutter-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: flutter-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/VVCE_Timetable_v${{ github.run_number }}_Android.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VVCE_Timetable_Android_APK
          path: build/app/outputs/flutter-apk/VVCE_Timetable_v${{ github.run_number }}_Android.apk
          retention-days: 30

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/VVCE_Timetable_v${{ github.run_number }}_Android.apk
          name: VVCE Timetable ${{ github.ref_name }}
          body: |
            ## 📱 VVCE Timetable ${{ github.ref_name }}
            ### Android — Download & install the APK
            Enable "Install from unknown sources" in Android Settings first.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          APK="build/app/outputs/flutter-apk/VVCE_Timetable_v${{ github.run_number }}_Android.apk"
          echo "## ✅ Android APK Built — $(du -sh $APK | cut -f1)" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — iOS Unsigned IPA (sideloadable via AltStore / Sideloadly)
# ─────────────────────────────────────────────────────────────────────────────
  build-ios:
    name: 🍎 iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: flutter-ios-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: flutter-ios-pub-

      - name: Install Flutter dependencies
        run: flutter pub get

      # ── Regenerate iOS folder if xcodeproj is missing or incomplete ──────
      - name: Ensure iOS project exists
        run: |
          if [ ! -f "ios/Runner.xcodeproj/project.pbxproj" ]; then
            echo "project.pbxproj missing — regenerating iOS project"
            flutter create --platforms=ios --org com.vvce .
          else
            echo "project.pbxproj found ✅"
          fi

      - name: Select Xcode version
        run: sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods --no-document
          cd ios && pod install --repo-update
        continue-on-error: true

      - name: Build iOS (unsigned — no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -r "VVCE_Timetable_v${{ github.run_number }}_iOS.ipa" Payload
          rm -rf Payload
          ls -lh "VVCE_Timetable_v${{ github.run_number }}_iOS.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VVCE_Timetable_iOS_IPA
          path: VVCE_Timetable_v${{ github.run_number }}_iOS.ipa
          retention-days: 30

      - name: Release IPA on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: VVCE_Timetable_v${{ github.run_number }}_iOS.ipa
          name: VVCE Timetable ${{ github.ref_name }}
          body: |
            ## 🍎 iOS IPA — Unsigned (sideload only)
            Install with **AltStore** (altstore.io) or **Sideloadly** (sideloadly.io).
            No jailbreak required.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          IPA="VVCE_Timetable_v${{ github.run_number }}_iOS.ipa"
          echo "## ✅ iOS IPA Built — $(du -sh $IPA | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "Install via **AltStore** or **Sideloadly**" >> $GITHUB_STEP_SUMMARY
