name: Build VVCE Timetable — Android APK + Deploy Web PWA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Android Universal APK
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: flutter-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: flutter-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/VVCE_Timetable_v${{ github.run_number }}_Android.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VVCE_Timetable_Android_APK
          path: build/app/outputs/flutter-apk/VVCE_Timetable_v${{ github.run_number }}_Android.apk
          retention-days: 30

      - name: Release APK on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/VVCE_Timetable_v${{ github.run_number }}_Android.apk
          name: VVCE Timetable ${{ github.ref_name }}
          body: |
            ## 📱 VVCE Timetable ${{ github.ref_name }}
            ### Android APK
            Download and install. Enable "Install from unknown sources" first.
            ### iPhone / Web
            Open the web app: https://YOUR_USERNAME.github.io/vvce_timetable/
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Android Summary
        run: |
          APK="build/app/outputs/flutter-apk/VVCE_Timetable_v${{ github.run_number }}_Android.apk"
          echo "## ✅ Android APK — $(du -sh $APK | cut -f1)" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Deploy PWA to GitHub Pages (for iPhone + any browser)
# ─────────────────────────────────────────────────────────────────────────────
  deploy-web:
    name: 🌐 Deploy Web PWA (iPhone)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify web files
        run: |
          echo "Web app files:"
          ls -lh web/
          ls -lh web/icons/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "🌐 Deploy VVCE Timetable Web PWA v${{ github.run_number }}"

      - name: Web Summary
        run: |
          echo "## ✅ Web PWA Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **iPhone users open:** https://\${{ github.repository_owner }}.github.io/vvce_timetable/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install on iPhone:" >> $GITHUB_STEP_SUMMARY
          echo "1. Open the URL in Safari" >> $GITHUB_STEP_SUMMARY
          echo "2. Tap Share button 📤" >> $GITHUB_STEP_SUMMARY
          echo "3. Tap 'Add to Home Screen'" >> $GITHUB_STEP_SUMMARY
          echo "4. Tap 'Add' — works like a native app! 🎉" >> $GITHUB_STEP_SUMMARY
